<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>旅行フレーズ</title>
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg:       #0c0c0f;
      --surface:  #17171d;
      --surface2: #1f1f28;
      --border:   #2d2d3a;
      --text:     #f0f0f2;
      --muted:    #72727f;
      --accent:   #e05a5a;
      --accent-d: rgba(224,90,90,0.12);
      --row-h:    45px;
      --sat: env(safe-area-inset-top,    44px);
      --sab: env(safe-area-inset-bottom, 20px);
    }

    html, body {
      height: 100%; overflow: hidden;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      background: var(--bg);
      transform: translateX(100%);
      transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
      will-change: transform;
    }
    .screen.active { transform: translateX(0); }
    .screen.under  { transform: translateX(-28%); }

    .hdr {
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .hdr-home {
      padding: calc(var(--sat) + 14px) 20px 16px;
    }
    .hdr-home .jp-ttl {
      font-size: 30px; font-weight: 300;
      color: var(--accent); letter-spacing: 6px;
    }
    .hdr-home .en-ttl {
      font-size: 11px; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--muted); margin-top: 3px;
    }

    .hdr-nav {
      height: calc(var(--sat) + 50px);
      display: flex; align-items: flex-end;
      padding: 0 12px 11px; gap: 6px;
    }
    .back-btn {
      display: flex; align-items: center; gap: 1px;
      color: var(--accent); font-size: 17px;
      background: none; border: none; cursor: pointer;
      font-family: inherit; padding: 4px 6px; border-radius: 8px;
      flex-shrink: 0; white-space: nowrap;
    }
    .back-btn:active { background: var(--accent-d); }
    .back-chev { font-size: 22px; line-height: 1; margin-top: -1px; }
    .hdr-ttl {
      font-size: 16px; font-weight: 600; flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

    .cat-row {
      display: flex; align-items: center;
      height: var(--row-h); padding: 0 20px;
      border-bottom: 1px solid var(--border);
      gap: 14px; cursor: pointer; user-select: none;
      transition: background 0.1s;
    }
    .cat-row:active { background: var(--surface2); }
    .cat-icon  { font-size: 18px; width: 26px; text-align: center; flex-shrink: 0; }
    .cat-label { font-size: 15px; flex: 1; }
    .cat-count { font-size: 12px; color: var(--muted); }
    .chev      { font-size: 14px; color: var(--border); margin-left: 2px; }

    .phrase-row {
      display: flex; align-items: center;
      height: var(--row-h); padding: 0 20px;
      border-bottom: 1px solid var(--border);
      gap: 10px; cursor: pointer; user-select: none;
      transition: background 0.1s;
    }
    .phrase-row:active { background: var(--surface2); }
    .pip        { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
    .pip-space  { width: 5px; flex-shrink: 0; }
    .phrase-en  {
      font-size: 14px; flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .phrase-rom {
      font-size: 11px; color: var(--muted);
      white-space: nowrap; max-width: 110px;
      overflow: hidden; text-overflow: ellipsis; flex-shrink: 0;
    }

    .detail-body {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 20px 28px calc(var(--sab) + 20px);
    }

    .detail-jp {
      font-size: 54px; line-height: 1.2;
      color: var(--accent); text-align: center;
      cursor: pointer; padding: 14px 20px; border-radius: 16px;
      transition: background 0.15s; user-select: none;
    }
    .detail-jp:active { background: var(--accent-d); }
    .detail-jp.speaking {
      animation: glow 0.9s ease-in-out infinite alternate;
    }
    @keyframes glow {
      from { text-shadow: 0 0 8px  rgba(224,90,90,0.3); }
      to   { text-shadow: 0 0 24px rgba(224,90,90,0.75); }
    }

    .detail-romaji {
      font-size: 26px; font-weight: 300; text-align: center;
      color: var(--text); letter-spacing: 0.5px;
      margin-top: 8px; margin-bottom: 10px;
    }
    .detail-pron {
      font-size: 14px; color: var(--muted);
      font-style: italic; text-align: center; margin-bottom: 30px;
    }
    .detail-div {
      width: 48px; height: 1px;
      background: var(--border); margin-bottom: 26px;
    }
    .detail-en {
      font-size: 18px; color: var(--text);
      text-align: center; line-height: 1.4;
    }

    .safe-b { height: var(--sab); flex-shrink: 0; }
  </style>
</head>
<body>

  <!-- Screen 0: Categories -->
  <div class="screen active" id="screen-categories">
    <div class="hdr hdr-home">

    </div>

    <div class="safe-b"></div>

    <div class="safe-b"></div>

  <!-- Screen 2: Detail -->

      <div class="detail-pron"   id="detail-pron"></div>
      <div class="detail-div"></div>
      <div class="detail-en"     id="detail-en"></div>
    </div>

const PM = {};
Object.values(PH).flat().forEach(p => PM[p.id] = p);

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
const SCREEN_IDS = ['categories', 'phrases', 'detail'];
let depth     = 0;
let activeCat = null;
let activeP   = null;

let recents = {};
try { recents = JSON.parse(localStorage.getItem('jp_recents') || '{}'); } catch(e) {}
function saveRecents() {
  try { localStorage.setItem('jp_recents', JSON.stringify(recents)); } catch(e) {}
}

// ═══════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════
function nav(d) {
  depth = d;
  SCREEN_IDS.forEach((id, i) => {
    const el = document.getElementById(`screen-${id}`);
    el.className = 'screen' + (i < d ? ' under' : i === d ? ' active' : '');
  });
}

// ═══════════════════════════════════════════════════
//  RENDER CATEGORIES
// ═══════════════════════════════════════════════════
function renderCats() {
  document.getElementById('cat-list').innerHTML =
    CATS.map(c => `
      <div class="cat-row" onclick="openCat('${c.id}')">
        <span class="cat-icon">${c.icon}</span>
        <span class="cat-label">${c.name}</span>
        <span class="cat-count">${PH[c.id].length}</span>
        <span class="chev">›</span>
      </div>`).join('');
}

// ═══════════════════════════════════════════════════
//  OPEN CATEGORY
// ═══════════════════════════════════════════════════
function openCat(catId) {
  activeCat = catId;
  const cat = CATS.find(c => c.id === catId);
  document.getElementById('phrases-title').textContent = cat.name;
  renderPhrases(catId);
  nav(1);
}

// ═══════════════════════════════════════════════════
//  RENDER PHRASES
// ═══════════════════════════════════════════════════
function renderPhrases(catId) {
  const now  = Date.now();
  const week = 7 * 24 * 3600 * 1000;
  const list = catId === 'numbers'
    ? [...PH[catId]]
    : [...PH[catId]].sort((a, b) => (recents[b.id]||0) - (recents[a.id]||0));
  document.getElementById('phrase-list').innerHTML =
    list.map(p => {
      const isRecent = recents[p.id] && (now - recents[p.id]) < week;
      return `
        <div class="phrase-row" onclick="openPhrase('${p.id}')">
          ${isRecent ? '<div class="pip"></div>' : '<div class="pip-space"></div>'}
          <span class="phrase-en">${p.en}</span>
          <span class="phrase-rom">${p.rom}</span>
          <span class="chev">›</span>
        </div>`;
    }).join('');
}

// ═══════════════════════════════════════════════════
//  OPEN PHRASE DETAIL
// ═══════════════════════════════════════════════════
function openPhrase(pid) {
  const p = PM[pid];
  if (!p) return;
  activeP = p;

  recents[pid] = Date.now();
  saveRecents();

  document.getElementById('detail-jp').textContent     = p.jp;
  document.getElementById('detail-romaji').textContent = p.rom;
  document.getElementById('detail-pron').textContent   = p.pro;
  document.getElementById('detail-en').textContent     = p.en;

  const cat = CATS.find(c => c.id === activeCat);
  document.getElementById('detail-back-lbl').textContent = cat ? cat.name : 'Back';

  nav(2);
}

// ═══════════════════════════════════════════════════
//  SPEECH
// ═══════════════════════════════════════════════════
function speak() {
  if (!activeP || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();

  const u = new SpeechSynthesisUtterance(activeP.jp);
  u.lang  = 'ja-JP';
  u.rate  = 0.8;
  u.pitch = 1;

  const el = document.getElementById('detail-jp');
  el.classList.add('speaking');
  u.onend  = () => el.classList.remove('speaking');
  u.onerror = () => el.classList.remove('speaking');

  window.speechSynthesis.speak(u);
}

// ═══════════════════════════════════════════════════
//  SWIPE BACK
// ═══════════════════════════════════════════════════
let tx = 0, ty = 0;
document.addEventListener('touchstart', e => {
  tx = e.touches[0].clientX;
  ty = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = Math.abs(e.changedTouches[0].clientY - ty);
  if (tx < 40 && dx > 60 && dy < 80 && depth > 0) nav(depth - 1);
}, { passive: true });

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
renderCats();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
